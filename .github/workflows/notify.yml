name: Order Notify

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check new order
        env:
          SB_URL: https://mgygehqpdvhlidlcxkcp.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA0NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k
          DING_TOKEN: https://oapi.dingtalk.com/robot/send?access_token=98770c077ec73b6db9973aa2810e0342e49c8c3df5dfc9197caea9dc6316eba8
        run: |
          mkdir -p .state
          LAST=0
          if [ -f .state/count ]; then
            LAST=$(cat .state/count)
          fi

          RESP=$(curl -s \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/app_data?id=eq.main&select=content")

          echo "$RESP" > data.json

          CURR=$(python3 -c "
import json
d = json.load(open('data.json'))
orders = d.get('content', {}).get('orders', [])
print(len(orders))
")

          echo "上一次订单数: $LAST"
          echo "当前订单数: $CURR"

          if [ $CURR -gt $LAST ]; then
            curl -s -X POST "$DING_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"msgtype":"text","text":{"content":"🧸 一二布布小铺：有新订单啦！"}}'
            echo "✅ 钉钉发送成功！"
          else
            echo "✅ 暂无新订单"
          fi

          echo $CURR > .state/count
