name: Order Notify
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Auto Check Order
        run: |
          mkdir -p .state
          LAST=0
          if [ -f .state/count ]; then
            LAST=$(cat .state/count)
          fi

          curl -s -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA0NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA0NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k" \
            "https://mgygehqpdvhlidlcxkcp.supabase.co/rest/v1/app?id=eq.main&select=content" > data.json

          CURR=$(python3 -c "import json;try:d=json.load(open('data.json'));if isinstance(d,list):d=d[0]if d else{};cnt=len(d.get('content',{}).get('orders',[]));except:cnt=0;print(cnt)")

          echo "上一次订单数：$LAST"
          echo "当前订单数：$CURR"

          if [ "$CURR" -gt "$LAST" ]; then
            curl -s -X POST "https://oapi.dingtalk.com/robot/send?access_token=98770c077ec73b6db9973aa2810e0342e49c8c3df5dfc9197caea9dc6316eba8" \
              -H "Content-Type: application/json" \
              -d '{"msgtype":"text","text":{"content":"\ud83e\uddf8 \u4e00\u4e8c\u5e03\u5e03\u5c0f\u94fa\uff1a\u6709\u65b0\u8ba2\u5355\u5566\uff01"}}'
            echo "✅ 钉钉已发送！"
          else
            echo "✅ 暂无新订单"
          fi

          echo "$CURR" > .state/count
