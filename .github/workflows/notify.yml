name: Order Notify

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: .state
          key: order-count-${{ github.run_id }}
          restore-keys: order-count-

      - name: Check and push
        env:
          SB_URL: https://mgygehqpdvhlidlcxkcp.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA5NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k
          DING_TOKEN: e16b0d3a7893c2e3181812a8817128405d8da84901dedd215ab02c769e62968b
        run: |
          mkdir -p .state
          LAST=0
          [ -f .state/count ] && LAST=$(cat .state/count)

          RESP=$(curl -s \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/app_data?id=eq.main&select=content")

          CURR=$(echo "$RESP" | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print(len(d[0]['content']['orders']))
          except:
              print(0)
          ")

          echo "last=$LAST curr=$CURR"

          if [ "$CURR" -gt "$LAST" ] && [ "$LAST" -gt 0 ]; then

            # 极简消息 → 必过钉钉校验
            MSG="新订单：检测到新订单，订单序号 $LAST → $CURR"

            # 最标准钉钉发送格式（无转义、无特殊字符）
            curl -s "https://oapi.dingtalk.com/robot/send?access_token=$DING_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"msgtype\": \"text\",
                \"text\": {\"content\": \"$MSG\"}
              }"

            echo "✅ 新订单已推送钉钉"
          else
            echo "no new orders"
          fi

          echo "$CURR" > .state/count

      - name: Save state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: .state
          key: order-count-${{ github.run_id }}
