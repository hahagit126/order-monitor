name: Order Notify

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Restore state
        uses: actions/cache/restore@v5
        with:
          path: .state
          key: order-count-${{ github.run_id }}
          restore-keys: order-count-

      - name: Check and push
        env:
          SB_URL: https://mgygehqpdvhlidlcxkcp.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA5NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k
          DING: https://oapi.dingtalk.com/robot/send?access_token=e16b0d3a7893c2e3181812a8817128405d8da84901dedd215ab02c769e62968b
        run: |
          mkdir -p .state

          LAST=0
          [ -f .state/count ] && LAST=$(cat .state/count)

          RESP=$(curl -s \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/app_data?id=eq.main&select=content")

          CURR=$(echo "$RESP" | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print(len(d[0]['content']['orders']))
          except:
              print(0)
          ")

          echo "last=$LAST curr=$CURR"

          if [ "$CURR" -gt "$LAST" ] && [ "$LAST" -gt 0 ]; then
            MSG=$(echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          orders=d[0]['content']['orders'][$LAST:]
          lines=['## 🧸 新订单来了']
          for o in orders:
              lines.append('---')
              lines.append('**订单 #'+str(o['id'])+'**  '+o.get('time',''))
              for item in o.get('items',[]):
                  nm=item[2] if len(item)>2 else '?'
                  em=item[3] if len(item)>3 else '?'
                  pr=item[4] if len(item)>4 else 0
                  qt=item[1]
                  lines.append('- '+em+' '+nm+' x'+str(qt)+'  ¥'+str(round(pr*qt,1)))
              lines.append('**💰 合计 ¥'+str(round(o.get('total',0),1))+'**')
          print('\n'.join(lines))
          ")

            curl -s -X POST "$DING" \
              -H 'Content-Type: application/json' \
              -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"新订单\",\"text\":\"$MSG\"}}"

            echo "pushed $((CURR-LAST)) orders"
          else
            echo "no new orders"
          fi

          echo "$CURR" > .state/count

      - name: Save state
        uses: actions/cache/save@v5
        if: always()
        with:
          path: .state
          key: order-count-${{ github.run_id }}
