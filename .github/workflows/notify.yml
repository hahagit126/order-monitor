name: Order Notify

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send DingTalk
        run: |
          curl -s -X POST "https://oapi.dingtalk.com/robot/send?access_token=98770c077ec73b6db9973aa2810e0342e49c8c3df5dfc9197caea9dc6316eba8" \
            -H "Content-Type: application/json" \
            -d '{"msgtype":"text","text":{"content":"🧸 一二布布小铺：定时检测运行中！"}}'
