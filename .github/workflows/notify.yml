name: 订单实时监控

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    # ← 加这一行
    steps:
      - name: 恢复缓存
        uses: actions/cache/restore@v4
        with:
          path: .state
          key: orders-${{ github.run_number }}
          restore-keys: orders-

      - name: 检查新订单并推送钉钉
        env:
          SB_URL: ${{ secrets.SB_URL }}
          SB_KEY: ${{ secrets.SB_KEY }}
          DING: ${{ secrets.DING }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, sys

          seen_file = ".state/seen.json"
          os.makedirs(".state", exist_ok=True)

          try:
              with open(seen_file) as f:
                  seen = set(json.load(f))
          except Exception:
              seen = set()

          url = f"{os.environ['SB_URL']}/rest/v1/app_data?id=eq.main&select=content"
          req = urllib.request.Request(url, headers={
              "apikey": os.environ["SB_KEY"],
              "Authorization": f"Bearer {os.environ['SB_KEY']}"
          })
          data = json.loads(urllib.request.urlopen(req).read())
          orders = data[0]["content"]["orders"]

          cutoff = int(time.time() * 1000) - 180000
          fresh = [o for o in orders
                   if o.get("ts", 0) > cutoff
                   and str(o["id"]) not in seen]

          if not fresh:
              print("没有新订单")
              sys.exit(0)

          lines = ["## 🧸 新订单来了"]
          new_ids = []
          for o in fresh:
              lines.append("---")
              lines.append(f"**订单 #{o['id']}**　{o.get('time', '')}")
              for item in o.get("items", []):
                  em = item[3] if len(item) > 3 else ""
                  nm = item[2] if len(item) > 2 else "?"
                  qt = item[1]
                  pr = item[4] if len(item) > 4 else 0
                  lines.append(f"- {em} {nm} x{qt}　¥{round(pr * qt, 1)}")
              lines.append(f"**💰 合计 ¥{round(o.get('total', 0), 1)}**")
              new_ids.append(str(o["id"]))

          msg = "\n".join(lines)

          body = json.dumps({
              "msgtype": "markdown",
              "markdown": {"title": "新订单来了", "text": msg}
          }).encode()
          urllib.request.urlopen(urllib.request.Request(
              os.environ["DING"],
              data=body,
              headers={"Content-Type": "application/json"}
          ))
          print(f"已推送 {len(fresh)} 个新订单")

          updated = list(seen | set(new_ids))[-500:]
          with open(seen_file, "w") as f:
              json.dump(updated, f)
          PYEOF

      - name: 保存缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .state
          key: orders-${{ github.run_number }}
