name: Order Notify

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check and notify
        env:
          SB_URL: https://mgygehqpdvhlidlcxkcp.supabase.co
          SB_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1neWdlaHFwZHZobGlkbGN4a2NwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njg3NzQsImV4cCI6MjA5NDE0NDc3NH0.CryPgSBZFrfEl8ZuxB7VPOiKx0UlIE00L6xRHV0KJ4k
          DING: https://oapi.dingtalk.com/robot/send?access_token=20a16d8507910591bec4bc36bd45acd955892a5a68fecb09843ad9e1b2c60d08
        run: |
          # 测试钉钉
          echo ">>> 测试钉钉连接..."
          TEST_RESP=$(curl -s -X POST "$DING" \
            -H 'Content-Type: application/json' \
            -d '{"msgtype":"text","text":{"content":"新订单 - 连接测试成功！"}}')
          echo "钉钉返回: $TEST_RESP"

          # 读取上次订单数
          LAST=0
          [ -f state/count.txt ] && LAST=$(cat state/count.txt)
          echo "上次订单数: $LAST"

          # 查 Supabase
          RESP=$(curl -s \
            -H "apikey: $SB_KEY" \
            -H "Authorization: Bearer $SB_KEY" \
            "$SB_URL/rest/v1/app_data?id=eq.main&select=content")

          CURR=$(echo "$RESP" | python3 -c "
          import sys,json
          try:
              d=json.load(sys.stdin)
              print(len(d[0]['content']['orders']))
          except:
              print(0)
          ")
          echo "当前订单数: $CURR"

          # 有新订单就推
          if [ "$CURR" -gt "$LAST" ] && [ "$LAST" -gt 0 ]; then
            echo "发现新订单！"
            MSG=$(echo "$RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          orders=d[0]['content']['orders'][$LAST:]
          lines=['## 🧸 新订单来了']
          for o in orders:
              lines.append('---')
              lines.append('**订单 #'+str(o['id'])+'**  '+o.get('time',''))
              for item in o.get('items',[]):
                  nm=item[2] if len(item)>2 else '?'
                  em=item[3] if len(item)>3 else '?'
                  pr=item[4] if len(item)>4 else 0
                  qt=item[1]
                  lines.append('- '+em+' '+nm+' x'+str(qt)+'  ¥'+str(round(pr*qt,1)))
              lines.append('**💰 合计 ¥'+str(round(o.get('total',0),1))+'**')
          print('\n'.join(lines))
          ")
            DING_RESP=$(curl -s -X POST "$DING" \
              -H 'Content-Type: application/json' \
              -d "{\"msgtype\":\"markdown\",\"markdown\":{\"title\":\"新订单来了\",\"text\":\"$MSG\"}}")
            echo "钉钉通知返回: $DING_RESP"
          elif [ "$LAST" -eq 0 ]; then
            echo "首次运行，记录订单数"
          else
            echo "没有新订单"
          fi

          mkdir -p state
          echo "$CURR" > state/count.txt
          echo "已保存: $CURR"

      - name: Save state
        run: |
          if [ -f state/count.txt ]; then
            git config user.name "bot"
            git config user.email "bot@bot.com"
            git add state/count.txt
            git diff --cached --quiet && echo "无变化" || (git commit -m "update count $(cat state/count.txt)" && git push)
          fi
